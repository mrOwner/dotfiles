# Set your personal hyprland configuration here
# for sample file, please refer https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

# Only AMD GPU for display (NVIDIA has no connected monitors)
env = WLR_DRM_DEVICES,/dev/dri/card2

exec-once = /usr/bin/hyprland-per-window-layout # keyboard layout for each window

input {
    kb_layout = us,ru
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = 0
}

device {
    name = epic mouse V1
    sensitivity = -0.1
}

monitor=DP-3, 2560x1440@60, 0x0, 1
monitor=eDP-2, 2560x1600@240, 2560x0, 1.6

# Bind workspaces 1-8 to external monitor, 9 to laptop (only when DP-3 connected)
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:eDP-2, default:true

$d=[$wm|Change focus]
bindd = ALT, h, $d focus left, movefocus, l
bindd = ALT, l, $d focus right , movefocus, r
bindd = ALT, k, $d focus up , movefocus, u
bindd = ALT, j, $d focus down, movefocus, d


bindd = SUPER, SPACE, Switch keyboard layout, exec, hyde-shell keyboardswitch

$d=[$l|Rofi menus]
$rofi-launch=hyde-shell rofilaunch
bindd = ALT, SPACE, $d application finder , exec, pkill -x rofi || $rofi-launch d

# Disable idle screen locking
exec = pkill -x hypridle

# Enable hardware cursors (fixes stuttering on NVIDIA + mixed refresh rates)
cursor:no_hardware_cursors = false

# Disable NVIDIA anti-flicker hack (causes stuttering on 60Hz with PRIME offload)
opengl:nvidia_anti_flicker = false

# Use AMD for rendering (both displays are on AMD, skip PRIME copy overhead)
env = GBM_BACKEND,
env = __GLX_VENDOR_LIBRARY_NAME,

# VS Code opacity override
windowrule = opacity 0.9 $& 0.9 $& 1,match:class ^(code-oss)$
windowrule = opacity 0.9 $& 0.9 $& 1,match:class ^([Cc]ode)$
windowrule = opacity 0.9 $& 0.9 $& 1,match:class ^(code-url-handler)$
windowrule = opacity 0.9 $& 0.9 $& 1,match:class ^(code-insiders-url-handler)$

# Unbind F-keys so they pass through to apps (media controls stay on XF86 keys via fn)
unbind = , F10
unbind = , F11
unbind = , F12
unbind = Shift, F11


# Russian layout equivalents for ALT focus binds
$d=[$wm|Change focus]
bindd = ALT, Cyrillic_er, $d focus left, movefocus, l   # СҖ вҶ’ h
bindd = ALT, Cyrillic_de, $d focus right, movefocus, r  # Рҙ вҶ’ l
bindd = ALT, Cyrillic_el, $d focus up, movefocus, u     # Р» вҶ’ k
bindd = ALT, Cyrillic_o, $d focus down, movefocus, d    # Рҫ вҶ’ j
