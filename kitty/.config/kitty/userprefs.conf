# Set your personal kitty configuration here

allow_remote_control yes

# Вертикальное разделение
map ctrl+shift+backslash launch --location=vsplit

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

font_size 11.0

# Russian layout shortcuts — map Cyrillic keysyms to same actions as Latin
# Cyrillic_es=c, Cyrillic_em=v, Cyrillic_ef=a
map ctrl+shift+Cyrillic_es copy_or_interrupt
map ctrl+shift+Cyrillic_em paste_from_clipboard
map ctrl+shift+Cyrillic_ef select_all
# Vertical split on Russian layout (backslash key is same in both layouts, no change needed)
